<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>クイズ回答分析</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; }
.container { max-width: 760px; margin: 0 auto; padding: 2rem 1rem; }
h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
.subtitle { font-size: 13px; color: #666; margin-bottom: 1.5rem; }
.tabs { display: flex; gap: 4px; border-bottom: 1px solid #ddd; margin-bottom: 1.5rem; }
.tab { padding: 8px 16px; font-size: 13px; border: none; background: transparent; cursor: pointer; color: #888; border-bottom: 2px solid transparent; margin-bottom: -1px; }
.tab.active { color: #1a1a1a; border-bottom: 2px solid #1a1a1a; font-weight: 500; }
.tab:hover:not(.active) { color: #444; }
.page { display: none; }
.page.active { display: block; }
.metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 1.5rem; }
.metric { background: #fff; border-radius: 10px; padding: 14px; border: 1px solid #e8e8e8; }
.metric-label { font-size: 11px; color: #888; margin-bottom: 4px; }
.metric-value { font-size: 24px; font-weight: 500; }
.metric-sub { font-size: 11px; color: #aaa; margin-top: 2px; }
.q-card { background: #fff; border: 1px solid #e8e8e8; border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 10px; }
.q-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 6px; }
.q-title { font-size: 13px; font-weight: 500; }
.q-best { font-size: 12px; padding: 3px 10px; border-radius: 20px; background: #E1F5EE; color: #0a5e44; font-weight: 500; }
.bars { display: flex; flex-direction: column; gap: 7px; }
.bar-row { display: flex; align-items: center; gap: 8px; }
.bar-label { font-size: 12px; color: #888; width: 16px; text-align: center; }
.bar-option { font-size: 11px; color: #888; width: 130px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; flex-shrink: 0; }
.bar-track { flex: 1; height: 22px; background: #f0f0ee; border-radius: 4px; overflow: hidden; min-width: 60px; }
.bar-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; padding-left: 6px; font-size: 11px; font-weight: 500; transition: width 0.6s ease; }
.bar-fill.best { background: #5DCAA5; color: #04342C; }
.bar-fill.mid { background: #FAC775; color: #412402; }
.bar-fill.low { background: #F0997B; color: #4A1B0C; }
.bar-fill.none { background: #e8e8e8; }
.bar-voters { font-size: 11px; color: #aaa; width: 28px; text-align: right; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { text-align: left; padding: 8px 10px; color: #888; font-weight: 400; font-size: 12px; border-bottom: 1px solid #eee; }
td { padding: 8px 10px; border-bottom: 1px solid #eee; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }
.badge-best { background: #E1F5EE; color: #0a5e44; }
.badge-mid { background: #FAEEDA; color: #633806; }
.badge-low { background: #FAECE7; color: #4A1B0C; }
.add-section { background: #fff; border: 1px solid #e8e8e8; border-radius: 12px; padding: 1rem 1.25rem; }
.add-section h3 { font-size: 14px; font-weight: 500; margin-bottom: 14px; }
.q-form { margin-bottom: 10px; }
.q-form-label { font-size: 12px; color: #888; margin-bottom: 5px; }
.radios { display: flex; gap: 12px; flex-wrap: wrap; }
.radios label { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #666; cursor: pointer; }
input[type=number] { padding: 6px 10px; font-size: 13px; border: 1px solid #ccc; border-radius: 8px; background: #fff; color: #1a1a1a; width: 80px; }
.btn { padding: 8px 18px; font-size: 13px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
.btn:hover { background: #333; }
.insight-box { background: #f0f0ee; border-radius: 8px; padding: 12px 14px; margin-bottom: 12px; font-size: 13px; line-height: 1.7; }
.insight-box strong { font-weight: 500; }
.data-row { display: flex; align-items: center; gap: 8px; padding: 7px 0; border-bottom: 1px solid #eee; font-size: 12px; color: #888; }
.data-row:last-child { border-bottom: none; }
.del-btn { margin-left: auto; padding: 2px 8px; font-size: 11px; border: 1px solid #ddd; border-radius: 6px; background: transparent; cursor: pointer; color: #aaa; }
.del-btn:hover { background: #f5f5f3; color: #666; }
.chart-wrap { position: relative; width: 100%; margin-bottom: 1.5rem; }
</style>
</head>
<body>
<div class="container">
  <h1>クイズ回答分析</h1>
  <p class="subtitle">どの選択肢を選ぶと高スコアにつながるかを分析します</p>
  <div class="tabs">
    <button class="tab active" onclick="showTab(event,'overview')">概要</button>
    <button class="tab" onclick="showTab(event,'questions')">問題別分析</button>
    <button class="tab" onclick="showTab(event,'ranking')">推奨選択肢</button>
    <button class="tab" onclick="showTab(event,'add')">データ追加</button>
  </div>
  <div id="page-overview" class="page active"></div>
  <div id="page-questions" class="page"></div>
  <div id="page-ranking" class="page"></div>
  <div id="page-add" class="page"></div>
</div>

<script>
const questions = [
  { id:1, text:"ドラマで演じてみたい役は？", options:{A:"お姉さん",B:"お母さん",C:"妹",D:"ペット"} },
  { id:2, text:"自分だけゆずれないこだわりは", options:{A:"カレールーとご飯を別",B:"焼肉お肉韓国海苔",C:"コーヒーブラック",D:"ひきわり納豆"} },
  { id:3, text:"第一印象", options:{A:"おとなしい",B:"賢そう",C:"天然そう",D:"怖そ"} },
  { id:4, text:"直したいくせ", options:{A:"どこでも口笛",B:"物忘れ",C:"洗濯を眺める",D:"考えこと"} },
  { id:5, text:"お気に入り映画", options:{A:"ラピュタ",B:"トトロ",C:"宅急便",D:"千と千尋"} },
  { id:6, text:"一番最初に買ったコスメは？", options:{A:"チーク",B:"ファンデーション",C:"リップ",D:"アイシャドー”} },
  { id:7, text:"おきにい入りおもちゃ", options:{A:"めちゃん",B:"シルバニア",C:"たまごっち",D:"ぽぽちゃん"} },
  { id:8, text:"カラオケSong", options:{A:"夜明け",B:"夜にかける",C:"はなみずき",D:"そばかす"} },
  { id:9, text:"すきすマスター", options:{A:"ジャグリング",B:"マジック",C:"麻雀",D:"ダーツ"} },
  { id:10, text:"ノイミーは？", options:{A:"居場所",B:"宝物",C:"人生",D:"青春"} },
];

let responses = [
  { answers:["B","A","A","C","B","C","C","B","D","A"], score:10 },
  { answers:["C","B","A","B","A","C","B","C","D","B"], score:40 },
  { answers:["A","D","A","B","D","C","C","B","D","B"], score:50 },
  { answers:["D","D","C","B","A","C","D","C","A","B"], score:40 },
  { answers:["A","B","C","D","C","C","A","D","B","D"], score:40 },
  { answers:["A","A","D","D","D","C","B","A","C","D"], score:50 },
];

let scoreChart = null;

function getOptionStats() {
  return questions.map((q, qi) => {
    const optionData = {};
    ['A','B','C','D'].forEach(opt => {
      const choosers = responses.filter(r => r.answers[qi] === opt);
      const avgScore = choosers.length ? choosers.reduce((s,r) => s + r.score, 0) / choosers.length : 0;
      optionData[opt] = { count: choosers.length, avgScore };
    });
    const validOpts = ['A','B','C','D'].filter(o => optionData[o].count > 0);
    const best = validOpts.length ? validOpts.reduce((b,o) => optionData[o].avgScore > optionData[b].avgScore ? o : b, validOpts[0]) : null;
    return { qi, q, optionData, best };
  });
}

function renderOverview() {
  const n = responses.length;
  const avg = n ? Math.round(responses.reduce((s,r)=>s+r.score,0)/n) : 0;
  const maxS = n ? Math.max(...responses.map(r=>r.score)) : 0;
  const minS = n ? Math.min(...responses.map(r=>r.score)) : 0;
  const el = document.getElementById('page-overview');
  el.innerHTML = `
    <div class="metrics">
      <div class="metric"><div class="metric-label">回答者数</div><div class="metric-value">${n}</div><div class="metric-sub">人</div></div>
      <div class="metric"><div class="metric-label">平均スコア</div><div class="metric-value">${avg}%</div></div>
      <div class="metric"><div class="metric-label">最高スコア</div><div class="metric-value">${maxS}%</div></div>
      <div class="metric"><div class="metric-label">最低スコア</div><div class="metric-value">${minS}%</div></div>
    </div>
    <div class="chart-wrap" style="height:${Math.max(160, n*46+60)}px;">
      <canvas id="scoreChart" role="img" aria-label="回答者別スコアの棒グラフ">各回答者のスコア</canvas>
    </div>
    <div class="insight-box">現在 <strong>${n}人</strong> のデータから分析中。平均スコアは <strong>${avg}%</strong>。「推奨選択肢」タブで正解に近い組み合わせを確認できます。</div>
  `;
  if (scoreChart) { scoreChart.destroy(); scoreChart = null; }
  scoreChart = new Chart(document.getElementById('scoreChart'), {
    type: 'bar',
    data: {
      labels: responses.map((_,i) => `回答者${i+1}`),
      datasets: [{
        label: 'スコア (%)',
        data: responses.map(r=>r.score),
        backgroundColor: responses.map(r => r.score>=60?'#5DCAA5':r.score>=40?'#FAC775':'#F0997B'),
        borderRadius: 4,
      }]
    },
    options: {
      responsive:true, maintainAspectRatio:false,
      plugins:{ legend:{display:false} },
      scales:{
        y:{min:0,max:100,ticks:{callback:v=>v+'%',font:{size:11}}},
        x:{ticks:{font:{size:11},autoSkip:false}}
      }
    }
  });
}

function renderQuestions() {
  const optStats = getOptionStats();
  document.getElementById('page-questions').innerHTML = optStats.map(s => {
    const bars = ['A','B','C','D'].map(opt => {
      const d = s.optionData[opt];
      const pct = (d.avgScore / 100) * 100;
      const isBest = opt === s.best;
      const cls = d.count===0?'none':isBest?'best':d.avgScore>=40?'mid':'low';
      const lbl = d.count>0 ? Math.round(d.avgScore)+'%' : '';
      return `<div class="bar-row">
        <div class="bar-label" style="font-weight:${isBest?'600':'400'}">${opt}</div>
        <div class="bar-option">${s.q.options[opt]}</div>
        <div class="bar-track"><div class="bar-fill ${cls}" style="width:${pct}%">${lbl}</div></div>
        <div class="bar-voters">${d.count>0?d.count+'人':'-'}</div>
      </div>`;
    }).join('');
    return `<div class="q-card">
      <div class="q-header">
        <div class="q-title">Q${s.qi+1}. ${s.q.text}</div>
        ${s.best?`<div class="q-best">${s.best}: ${s.q.options[s.best]}</div>`:''}
      </div>
      <div class="bars">${bars}</div>
    </div>`;
  }).join('');
}

function renderRanking() {
  const optStats = getOptionStats();
  const rows = optStats.map(s => {
    if (!s.best) return `<tr><td>Q${s.qi+1}</td><td style="color:#888;font-size:12px;">${s.q.text}</td><td>-</td><td>-</td></tr>`;
    const d = s.optionData[s.best];
    const score = Math.round(d.avgScore);
    const bcls = score>=60?'badge-best':score>=40?'badge-mid':'badge-low';
    return `<tr>
      <td style="font-size:12px;color:#888;">Q${s.qi+1}</td>
      <td style="font-size:12px;color:#888;">${s.q.text}</td>
      <td><span class="badge ${bcls}">${s.best}: ${s.q.options[s.best]}</span></td>
      <td style="text-align:right;font-size:13px;">${score}%</td>
    </tr>`;
  }).join('');
  document.getElementById('page-ranking').innerHTML = `
    <div class="insight-box" style="margin-bottom:1rem;">各問で、その選択肢を選んだ人の<strong>平均スコアが最も高い選択肢</strong>を表示。緑が高・黄が中・赤が低スコア傾向。</div>
    <div class="q-card" style="padding:0;overflow:hidden;">
      <table><thead><tr><th style="width:36px;">問</th><th>質問</th><th>推奨選択肢</th><th style="text-align:right;">平均スコア</th></tr></thead><tbody>${rows}</tbody></table>
    </div>`;
}

function renderAdd() {
  const inputs = questions.map((q,i) => `
    <div class="q-form">
      <div class="q-form-label">Q${i+1}. ${q.text}</div>
      <div class="radios">
        ${['A','B','C','D'].map(o=>`<label><input type="radio" name="q${i}" value="${o}"> ${o}: ${q.options[o]}</label>`).join('')}
      </div>
    </div>`).join('');
  const dataRows = responses.map((r,i)=>`
    <div class="data-row">
      <span style="color:#1a1a1a;font-weight:500;width:70px;">回答者${i+1}</span>
      <span style="letter-spacing:2px;">${r.answers.join(' ')}</span>
      <span style="margin-left:auto;font-weight:500;color:#1a1a1a;">${r.score}%</span>
      <button class="del-btn" onclick="deleteResponse(${i})">削除</button>
    </div>`).join('');
  document.getElementById('page-add').innerHTML = `
    <div class="add-section">
      <h3>新しい回答を追加</h3>
      ${inputs}
      <div style="display:flex;align-items:center;gap:10px;margin:14px 0;">
        <span style="font-size:13px;color:#888;">正解率 (%):</span>
        <input type="number" id="newScore" min="0" max="100" step="10" placeholder="例: 40">
      </div>
      <button class="btn" onclick="addResponse()">追加する</button>
      <div id="addMsg" style="font-size:13px;margin-top:10px;min-height:18px;"></div>
    </div>
    <div style="margin-top:1.5rem;">
      <div style="font-size:13px;color:#888;margin-bottom:8px;">現在のデータ（${responses.length}件）</div>
      ${dataRows}
    </div>`;
}

function addResponse() {
  const answers = questions.map((_,i)=>{
    const sel = document.querySelector(`input[name=q${i}]:checked`);
    return sel ? sel.value : null;
  });
  const score = parseInt(document.getElementById('newScore').value);
  const missing = answers.indexOf(null);
  const msg = document.getElementById('addMsg');
  if (missing !== -1) { msg.style.color='#c0392b'; msg.textContent=`Q${missing+1}の選択肢を選んでください`; return; }
  if (isNaN(score)||score<0||score>100) { msg.style.color='#c0392b'; msg.textContent='正解率を0〜100で入力してください'; return; }
  responses.push({ answers, score });
  msg.style.color='#0a5e44'; msg.textContent=`追加しました！（合計 ${responses.length} 件）`;
  renderAll(); renderAdd();
}

function deleteResponse(i) {
  if (!confirm(`回答者${i+1}のデータを削除しますか？`)) return;
  responses.splice(i, 1);
  renderAll(); renderAdd();
}

function showTab(e, tab) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  e.target.classList.add('active');
  document.getElementById('page-'+tab).classList.add('active');
  if (tab==='overview') renderOverview();
  else if (tab==='questions') renderQuestions();
  else if (tab==='ranking') renderRanking();
  else if (tab==='add') renderAdd();
}

function renderAll() { renderOverview(); renderQuestions(); renderRanking(); }
renderAll();
</script>
</body>
</html>
