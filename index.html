<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ノイミー推しクイズ回答分析</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Sans', 'Yu Gothic', sans-serif;
      background: #a8e8d8;
      color: #0d3d30;
      min-height: 100vh;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 20px;
      font-weight: 500;
      margin-bottom: 4px;
      color: #083d2e;
    }

    .subtitle {
      font-size: 13px;
      color: #2a7a60;
      margin-bottom: 1.5rem;
    }

    .tabs {
      display: flex;
      gap: 4px;
      border-bottom: 1px solid #7ecfb8;
      margin-bottom: 1.5rem;
    }

    .tab {
      padding: 8px 16px;
      font-size: 13px;
      border: none;
      background: transparent;
      cursor: pointer;
      color: #2a7a60;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
    }

    .tab.active {
      color: #083d2e;
      border-bottom: 2px solid #083d2e;
      font-weight: 500;
    }

    .tab:hover:not(.active) {
      color: #0d3d30;
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .metric {
      background: #fff;
      border-radius: 10px;
      padding: 14px;
      border: 1px solid #9adfc8;
    }

    .metric-label {
      font-size: 11px;
      color: #2a7a60;
      margin-bottom: 4px;
    }

    .metric-value {
      font-size: 24px;
      font-weight: 500;
      color: #083d2e;
    }

    .metric-sub {
      font-size: 11px;
      color: #4aab8a;
      margin-top: 2px;
    }

    .q-card {
      background: #fff;
      border: 1px solid #9adfc8;
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 10px;
    }

    .q-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
      gap: 6px;
    }

    .q-title {
      font-size: 13px;
      font-weight: 500;
      color: #083d2e;
    }

    .q-best {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 20px;
      background: #E1F5EE;
      color: #0a5e44;
      font-weight: 500;
    }

    .bars {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .bar-label {
      font-size: 12px;
      color: #2a7a60;
      width: 16px;
      text-align: center;
    }

    .bar-option {
      font-size: 11px;
      color: #2a7a60;
      width: 130px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      flex-shrink: 0;
    }

    .bar-track {
      flex: 1;
      height: 22px;
      background: #c8f0e4;
      border-radius: 4px;
      overflow: hidden;
      min-width: 60px;
    }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      display: flex;
      align-items: center;
      padding-left: 6px;
      font-size: 11px;
      font-weight: 500;
      transition: width 0.6s ease;
    }

    .bar-fill.best {
      background: #5DCAA5;
      color: #04342C;
    }

    .bar-fill.mid {
      background: #FAC775;
      color: #412402;
    }

    .bar-fill.low {
      background: #F0997B;
      color: #4A1B0C;
    }

    .bar-fill.none {
      background: #e8e8e8;
    }

    .bar-voters {
      font-size: 11px;
      color: #4aab8a;
      width: 28px;
      text-align: right;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th {
      text-align: left;
      padding: 8px 10px;
      color: #2a7a60;
      font-weight: 400;
      font-size: 12px;
      border-bottom: 1px solid #c8f0e4;
    }

    td {
      padding: 8px 10px;
      border-bottom: 1px solid #c8f0e4;
      vertical-align: middle;
      color: #0d3d30;
    }

    tr:last-child td {
      border-bottom: none;
    }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
    }

    .badge-best {
      background: #E1F5EE;
      color: #0a5e44;
    }

    .badge-mid {
      background: #FAEEDA;
      color: #633806;
    }

    .badge-low {
      background: #FAECE7;
      color: #4A1B0C;
    }

    .rec-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 10px;
      margin-bottom: 1.5rem;
    }

    .rec-card {
      background: #fff;
      border: 1px solid #9adfc8;
      border-radius: 12px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .rec-card-q {
      font-size: 11px;
      color: #4aab8a;
    }

    .rec-card-choice {
      font-size: 14px;
      font-weight: 500;
      color: #083d2e;
    }

    .rec-card-label {
      font-size: 11px;
      color: #2a7a60;
    }

    .rec-card-score {
      font-size: 12px;
      font-weight: 500;
      margin-top: 4px;
    }

    .rec-card.high .rec-card-score {
      color: #0a5e44;
    }

    .rec-card.mid .rec-card-score {
      color: #633806;
    }

    .rec-card.low .rec-card-score {
      color: #4A1B0C;
    }

    .rec-card.high {
      border-left: 3px solid #5DCAA5;
    }

    .rec-card.mid {
      border-left: 3px solid #FAC775;
    }

    .rec-card.low {
      border-left: 3px solid #F0997B;
    }

    .surveys-list {
      margin-bottom: 1.5rem;
    }

    .survey-item {
      background: #fff;
      border: 1px solid #9adfc8;
      border-radius: 10px;
      padding: 12px 14px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: border-color 0.15s;
    }

    .survey-item:hover {
      border-color: #2a7a60;
    }

    .survey-item.active-survey {
      border-color: #083d2e;
      background: #e6f9f3;
    }

    .survey-name {
      font-size: 14px;
      font-weight: 500;
      flex: 1;
      color: #083d2e;
    }

    .survey-meta {
      font-size: 11px;
      color: #4aab8a;
    }

    .survey-del {
      padding: 2px 8px;
      font-size: 11px;
      border: 1px solid #9adfc8;
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      color: #4aab8a;
    }

    .survey-del:hover {
      background: #e6f9f3;
      color: #0d3d30;
    }

    .new-survey-form {
      background: #fff;
      border: 1px solid #9adfc8;
      border-radius: 12px;
      padding: 1rem 1.25rem;
    }

    .new-survey-form h3 {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 14px;
      color: #083d2e;
    }

    .form-row {
      margin-bottom: 12px;
    }

    .form-label {
      font-size: 12px;
      color: #2a7a60;
      margin-bottom: 5px;
    }

    input[type=text] {
      padding: 6px 10px;
      font-size: 13px;
      border: 1px solid #9adfc8;
      border-radius: 8px;
      background: #fff;
      color: #0d3d30;
      width: 100%;
    }

    .q-builder {
      margin-bottom: 14px;
    }

    .q-builder-row {
      background: #e6f9f3;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 8px;
    }

    .q-builder-row .q-num-label {
      font-size: 11px;
      color: #4aab8a;
      margin-bottom: 6px;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-top: 6px;
    }

    .opt-input-wrap {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .opt-letter {
      font-size: 12px;
      color: #2a7a60;
      font-weight: 500;
      width: 14px;
      flex-shrink: 0;
    }

    .btn-add-q {
      padding: 6px 14px;
      font-size: 12px;
      background: transparent;
      border: 1px solid #7ecfb8;
      border-radius: 8px;
      cursor: pointer;
      color: #2a7a60;
      margin-bottom: 14px;
    }

    .btn-add-q:hover {
      border-color: #2a7a60;
    }

    .btn-del-q {
      padding: 2px 8px;
      font-size: 11px;
      border: 1px solid #9adfc8;
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      color: #4aab8a;
      float: right;
    }

    .btn-del-q:hover {
      background: #c8f0e4;
      color: #0d3d30;
    }

    .add-section {
      background: #fff;
      border: 1px solid #9adfc8;
      border-radius: 12px;
      padding: 1rem 1.25rem;
    }

    .add-section h3 {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 14px;
      color: #083d2e;
    }

    .q-form {
      margin-bottom: 10px;
    }

    .q-form-label {
      font-size: 12px;
      color: #2a7a60;
      margin-bottom: 5px;
    }

    .radios {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .radios label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: #0d3d30;
      cursor: pointer;
    }

    input[type=number] {
      padding: 6px 10px;
      font-size: 13px;
      border: 1px solid #9adfc8;
      border-radius: 8px;
      background: #fff;
      color: #0d3d30;
      width: 80px;
    }

    .btn {
      padding: 8px 18px;
      font-size: 13px;
      background: #083d2e;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn:hover {
      background: #0d3d30;
    }

    .insight-box {
      background: #c8f0e4;
      border-radius: 8px;
      padding: 12px 14px;
      margin-bottom: 12px;
      font-size: 13px;
      line-height: 1.7;
      color: #0d3d30;
    }

    .insight-box strong {
      font-weight: 500;
      color: #083d2e;
    }

    .data-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 0;
      border-bottom: 1px solid #c8f0e4;
      font-size: 12px;
      color: #2a7a60;
    }

    .data-row:last-child {
      border-bottom: none;
    }

    .del-btn {
      margin-left: auto;
      padding: 2px 8px;
      font-size: 11px;
      border: 1px solid #9adfc8;
      border-radius: 6px;
      background: transparent;
      cursor: pointer;
      color: #4aab8a;
    }

    .del-btn:hover {
      background: #e6f9f3;
      color: #0d3d30;
    }

    .chart-wrap {
      position: relative;
      width: 100%;
      margin-bottom: 1.5rem;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>ノイミー推しメンクイズ回答分析💎</h1>
    <p class="subtitle">どの選択肢を選ぶと高スコアにつながるかを分析します</p>
    <div class="tabs">
      <button class="tab active" onclick="showTab(event,'overview')">概要</button>
      <button class="tab" onclick="showTab(event,'questions')">問題別分析</button>
      <button class="tab" onclick="showTab(event,'ranking')">推奨選択肢</button>
      <button class="tab" onclick="showTab(event,'add')">データ追加</button>
    </div>
    <div id="page-overview" class="page active"></div>
    <div id="page-questions" class="page"></div>
    <div id="page-ranking" class="page"></div>
    <div id="page-add" class="page"></div>
  </div>

  <script>
    // ─── データ構造 ───────────────────────────────────────────
    // 初期データ（ローカルストレージが空の場合に使用）
    const defaultSurveys = [
      {
        id: 0,
        name: "ノイミー クイズ",
        questions: [
          { id: 1, text: "ドラマで演じてみたい役は？", options: { A: "お姉さん", B: "お母さん", C: "妹", D: "ペット" } },
          { id: 2, text: "自分だけゆずれないこだわりは", options: { A: "カレールーとご飯を別", B: "焼肉お肉韓国海苔", C: "コーヒーブラック", D: "ひきわり納豆" } },
          { id: 3, text: "第一印象", options: { A: "おとなしい", B: "賢そう", C: "天然そう", D: "怖そ" } },
          { id: 4, text: "直したいくせ", options: { A: "どこでも口笛", B: "物忘れ", C: "洗濯を眺める", D: "考えこと" } },
          { id: 5, text: "お気に入り映画", options: { A: "ラピュタ", B: "トトロ", C: "宅急便", D: "千と千尋" } },
          { id: 6, text: "一番最初に買ったコスメは？", options: { A: "チーク", B: "ファンデーション", C: "リップ", D: "アイシャドー" } },
          { id: 7, text: "おきにい入りおもちゃ", options: { A: "めちゃん", B: "シルバニア", C: "たまごっち", D: "ぽぽちゃん" } },
          { id: 8, text: "カラオケSong", options: { A: "夜明け", B: "夜にかける", C: "はなみずき", D: "そばかす" } },
          { id: 9, text: "すきすマスター", options: { A: "ジャグリング", B: "マジック", C: "麻雀", D: "ダーツ" } },
          { id: 10, text: "ノイミーは？", options: { A: "居場所", B: "宝物", C: "人生", D: "青春" } },
        ],
        responses: [
          { answers: ["B", "A", "A", "C", "B", "C", "C", "B", "D", "A"], score: 10 },
          { answers: ["C", "B", "A", "B", "A", "C", "B", "C", "D", "B"], score: 40 },
          { answers: ["A", "D", "A", "B", "D", "C", "C", "B", "D", "B"], score: 50 },
          { answers: ["D", "D", "C", "B", "A", "C", "D", "C", "A", "B"], score: 40 },
          { answers: ["A", "B", "C", "D", "C", "C", "A", "D", "B", "D"], score: 40 },
          { answers: ["A", "A", "D", "D", "D", "C", "B", "A", "C", "D"], score: 50 },
        ],
      }
    ];

    // 【追加】ローカルストレージからデータを読み込み、無ければ初期データをセット
    let surveys = JSON.parse(localStorage.getItem('noemie_surveys')) || defaultSurveys;

    // 【追加】アクティブなアンケートIDも保存されていれば復元
    let activeSurveyId = parseInt(localStorage.getItem('noemie_active_id')) || surveys[0].id;
    let scoreChart = null;

    // 【追加】データをローカルストレージに保存する共通関数
    function saveToStorage() {
      localStorage.setItem('noemie_surveys', JSON.stringify(surveys));
      localStorage.setItem('noemie_active_id', activeSurveyId.toString());
    }

    function getSurvey() { return surveys.find(s => s.id === activeSurveyId) || surveys[0]; }
    function get(id) { return document.getElementById(id); }

    // ─── 統計計算 ───────────────────────────────────────────
    // （既存の getOptionStats はそのまま）
    function getOptionStats(survey) {
      return survey.questions.map((q, qi) => {
        const optionData = {};
        ['A', 'B', 'C', 'D'].forEach(opt => {
          const choosers = survey.responses.filter(r => r.answers[qi] === opt);
          const avgScore = choosers.length ? choosers.reduce((s, r) => s + r.score, 0) / choosers.length : 0;
          optionData[opt] = { count: choosers.length, avgScore };
        });
        const validOpts = ['A', 'B', 'C', 'D'].filter(o => optionData[o].count > 0);
        const best = validOpts.length ? validOpts.reduce((b, o) => optionData[o].avgScore > optionData[b].avgScore ? o : b, validOpts[0]) : null;
        return { qi, q, optionData, best };
      });
    }

    // ─── 概要・問題別分析・推奨選択肢 ─────────────────────────
    // （既存の renderOverview, renderQuestions, renderRanking はそのまま）
    // ...[中略]...

    // ─── データ追加 ─────────────────────────────────────────
    let addTargetSurveyId = null;

    function renderAdd() {
      if (addTargetSurveyId === null) addTargetSurveyId = activeSurveyId;
      const sv = surveys.find(s => s.id === addTargetSurveyId) || getSurvey();

      const surveyOptions = surveys.map(s =>
        `<option value="${s.id}" ${s.id === sv.id ? 'selected' : ''}>${s.name}</option>`
      ).join('');

      const inputs = sv.questions.map((q, i) => `
    <div class="q-form">
      <div class="q-form-label">Q${i + 1}. ${q.text}</div>
      <div class="radios">
        ${['A', 'B', 'C', 'D'].map(o => `<label><input type="radio" name="q${i}" value="${o}"> ${o}: ${q.options[o]}</label>`).join('')}
      </div>
    </div>`).join('');

      const dataRows = sv.responses.map((r, i) => `
    <div class="data-row">
      <span style="color:#083d2e;font-weight:500;width:70px;">回答者${i + 1}</span>
      <span style="letter-spacing:2px;">${r.answers.join(' ')}</span>
      <span style="margin-left:auto;font-weight:500;color:#083d2e;">${r.score}%</span>
      <button class="del-btn" onclick="deleteResponse(${i})">削除</button>
    </div>`).join('');

      get('page-add').innerHTML = `
    <div class="add-section">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
        <span style="font-size:13px;color:#2a7a60;white-space:nowrap;">対象アンケート:</span>
        <select onchange="switchAddTarget(this.value)" style="flex:1;padding:6px 10px;font-size:13px;border:1px solid #9adfc8;border-radius:8px;background:#fff;color:#083d2e;cursor:pointer;">
          ${surveyOptions}
        </select>
      </div>
      <h3 style="font-size:14px;font-weight:500;margin-bottom:14px;color:#083d2e;">新しい回答を追加 — ${sv.name}</h3>
      ${inputs}
      <div style="display:flex;align-items:center;gap:10px;margin:14px 0;">
        <span style="font-size:13px;color:#2a7a60;">正解率 (%):</span>
        <input type="number" id="newScore" min="0" max="100" step="10" placeholder="例: 40">
      </div>
      <button class="btn" onclick="addResponse()">追加する</button>
      <div id="addMsg" style="font-size:13px;margin-top:10px;min-height:18px;"></div>
    </div>
    <div style="margin-top:1.5rem;">
      <div style="font-size:13px;color:#2a7a60;margin-bottom:8px;">現在のデータ（${sv.responses.length}件）</div>
      ${dataRows || '<div style="font-size:13px;color:#4aab8a;padding:8px 0;">まだデータがありません</div>'}
    </div>`;
    }

    function switchAddTarget(id) {
      addTargetSurveyId = parseInt(id);
      renderAdd();
    }

    function addResponse() {
      const sv = surveys.find(s => s.id === addTargetSurveyId) || getSurvey();
      const answers = sv.questions.map((_, i) => {
        const sel = document.querySelector(`input[name=q${i}]:checked`);
        return sel ? sel.value : null;
      });
      const score = parseInt(get('newScore').value);
      const missing = answers.indexOf(null);
      const msg = get('addMsg');
      if (missing !== -1) { msg.style.color = '#c0392b'; msg.textContent = `Q${missing + 1}の選択肢を選んでください`; return; }
      if (isNaN(score) || score < 0 || score > 100) { msg.style.color = '#c0392b'; msg.textContent = '正解率を0〜100で入力してください'; return; }
      sv.responses.push({ answers, score });

      saveToStorage(); // 【追加】ローカルストレージへ保存

      msg.style.color = '#0a5e44'; msg.textContent = `追加しました！（合計 ${sv.responses.length} 件）`;
      renderAll(); renderAdd();
    }

    function deleteResponse(i) {
      const sv = surveys.find(s => s.id === addTargetSurveyId) || getSurvey();
      if (!confirm(`回答者${i + 1}のデータを削除しますか？`)) return;
      sv.responses.splice(i, 1);

      saveToStorage(); // 【追加】ローカルストレージへ保存

      renderAll(); renderAdd();
    }

    // ─── アンケート管理 ──────────────────────────────────────
    let newSurveyQuestions = [{ text: '', options: { A: '', B: '', C: '', D: '' } }];
    let renamingId = null;

    function startRename(id) { renamingId = id; renderOverview(); }
    function cancelRename() { renamingId = null; renderOverview(); }

    function applyRename(id) {
      const inp = get(`rename-input-${id}`);
      const name = inp ? inp.value.trim() : '';
      if (!name) return;
      const sv = surveys.find(s => s.id === id);
      if (sv) sv.name = name;
      renamingId = null;

      saveToStorage(); // 【追加】ローカルストレージへ保存

      renderAll();
      if (addTargetSurveyId === id) renderAdd();
    }

    function updateNewQ(i, field, val) {
      if (field === 'text') newSurveyQuestions[i].text = val;
      else newSurveyQuestions[i].options[field.split('_')[1]] = val;
    }

    function addNewQ() {
      newSurveyQuestions.push({ text: '', options: { A: '', B: '', C: '', D: '' } });
      renderOverview();
    }

    function removeNewQ(i) {
      newSurveyQuestions.splice(i, 1);
      renderOverview();
    }

    function createSurvey() {
      const name = get('newSurveyName').value.trim();
      const msg = get('surveyMsg');
      if (!name) { msg.style.color = '#c0392b'; msg.textContent = 'アンケート名を入力してください'; return; }
      for (let i = 0; i < newSurveyQuestions.length; i++) {
        const q = newSurveyQuestions[i];
        if (!q.text.trim()) { msg.style.color = '#c0392b'; msg.textContent = `Q${i + 1}の質問文を入力してください`; return; }
        if (Object.values(q.options).some(o => !o.trim())) { msg.style.color = '#c0392b'; msg.textContent = `Q${i + 1}の選択肢をすべて入力してください`; return; }
      }
      const newId = Date.now();
      surveys.push({
        id: newId, name,
        questions: newSurveyQuestions.map((q, i) => ({ id: i + 1, text: q.text, options: { ...q.options } })),
        responses: [],
      });
      activeSurveyId = newId;
      addTargetSurveyId = newId;
      newSurveyQuestions = [{ text: '', options: { A: '', B: '', C: '', D: '' } }];

      saveToStorage(); // 【追加】ローカルストレージへ保存

      renderAll();
    }

    function switchSurvey(id) {
      activeSurveyId = id;
      localStorage.setItem('noemie_active_id', id.toString()); // 【追加】アクティブIDを保存
      renderAll();
    }

    function deleteSurvey(id) {
      const sv = surveys.find(s => s.id === id);
      if (!confirm(`「${sv?.name}」を削除しますか？\nこのアンケートのすべての回答データも削除されます。`)) return;
      surveys = surveys.filter(s => s.id !== id);
      if (activeSurveyId === id) activeSurveyId = surveys[0].id;
      if (addTargetSurveyId === id) addTargetSurveyId = surveys[0].id;

      saveToStorage(); // 【追加】ローカルストレージへ保存

      renderAll();
    }

    // ─── タブ切替 ────────────────────────────────────────────
    function showTab(e, tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      e.target.classList.add('active');
      get('page-' + tab).classList.add('active');
      if (tab === 'overview') renderOverview();
      else if (tab === 'questions') renderQuestions();
      else if (tab === 'ranking') renderRanking();
      else if (tab === 'add') renderAdd();
    }

    function renderAll() { renderOverview(); renderQuestions(); renderRanking(); }
    renderAll();
  </script>
</body>

</html>
